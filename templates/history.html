<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - 可疑进程行为分析</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="sidebar">
        <h2 class="sidebar-title">进程风险分析</h2>
        <ul class="nav-list">
            <li class="nav-item"><a href="/">仪表盘</a></li>
            <li class="nav-item"><a href="/processes">进程列表</a></li>
            <li class="nav-item"><a href="/rules">规则管理</a></li>
            <li class="nav-item active"><a href="/history">历史记录</a></li>
        </ul>
    </nav>
    <main class="content">
        <h1>历史记录</h1>
        <div class="chart-box">
            <h3>风险趋势</h3>
            <canvas id="history-trend-chart"></canvas>
        </div>
        <table class="data-table" id="history-table">
            <thead>
                <tr>
                    <th>扫描时间</th>
                    <th>进程总数</th>
                    <th>高风险数</th>
                    <th>触发方式</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
        </table>
    </main>
    <script src="/static/js/history.js"></script>
</body>
</html>
